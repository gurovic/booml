<!DOCTYPE html>
<html>
<head>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>{{ notebook.title }}</title>
    {% load static %}
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false,
                ready: () => {
                    MathJax.startup.defaultReady();
                    if (window.NotebookUtils?.flushLatexQueue) {
                        window.NotebookUtils.flushLatexQueue();
                    }
                }
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="{% static 'notebook/js/utils.js' %}"></script>
    <script src="{% static 'notebook/js/notebook_detail.js' %}"></script>
    <style>
        .cell.clipboard-highlight {
            border: 1px solid #4caf50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.4);
        }
        .clipboard-indicator {
            margin-left: 12px;
            font-size: 14px;
            color: #444;
        }
        .clipboard-indicator[data-state="empty"] {
            color: #777;
            font-style: italic;
        }
        [data-paste-button][disabled] {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #cells-container {
            max-width: 95% !important;
            margin: 0 auto;
        }
        
        .cell {
            width: 100%;
            box-sizing: border-box;
        }
        
        .cell-content {
            width: 100%;
            box-sizing: border-box;
        }
        
        .cell-content textarea {
            width: 100%;
            min-height: 200px;
            box-sizing: border-box;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div id="notebook-{{ notebook.id }}"
         data-notebook-id="{{ notebook.id }}"
         data-create-cell-url="{% url 'runner:create_cell' notebook.id %}"
         data-create-latex-cell-url="{% url 'runner:create_latex_cell' notebook.id %}"
         data-run-cell-url="{% url 'run-cell' %}"
         data-session-create-url="{% url 'notebook-session-create' %}"
         data-session-reset-url="{% url 'session-reset' %}"
         data-session-files-url="{% url 'session-files' %}"
         data-session-file-download-url="{% url 'session-file-download' %}"
         data-session-stop-url="{% url 'session-stop' %}"
         data-delete-url-template="{% url 'runner:delete_cell' notebook.id 0 %}"
         data-copy-cell-url-template="{% url 'runner:copy_cell' notebook.id 0 %}"
         data-move-cell-url-template="{% url 'runner:move_cell' notebook.id 0 %}"
         data-save-output-url-template="{% url 'runner:save_cell_output' notebook.id 0 %}">

        <div class="notebook-header">
            <div class="notebook-header-title">
                <a class="notebook-back-link" href="{% url 'runner:notebook_list' %}">← К списку блокнотов</a>
                <h1 id="notebook-title">{{ notebook.title }}</h1>
            </div>
            <form id="rename-notebook-form"
                  class="notebook-rename-form"
                  method="post"
                  action="{% url 'runner:rename_notebook' notebook.id %}">
                {% csrf_token %}
                <label for="notebook-rename-input">Новое название:</label>
                <input type="text"
                       id="notebook-rename-input"
                       name="title"
                       value="{{ notebook.title }}"
                       placeholder="Введите новое название блокнота">
                <button type="submit">Сохранить</button>
            </form>
        </div>

        <div class="session-controls" data-session-controls>
            <div class="session-status-row">
                <span>Состояние сессии:</span>
                <span data-session-status>Сессия не создана</span>
            </div>
            <div class="session-actions">
                <button type="button" data-action="create-session">🚀 Создать сессию</button>
                <button type="button" data-action="reset-session">♻️ Перезапустить сессию</button>
                <button type="button" data-action="stop-session">⏹ Остановить сессию</button>
            </div>
        </div>

        <aside class="notebook-files-panel" data-files-panel>
            <div class="files-panel-header">
                <span>Файлы сессии</span>
                <button type="button" data-action="refresh-files">Обновить</button>
            </div>
            <div class="files-panel-body" data-files-list>
                <div class="files-empty">Файлы ещё не созданы</div>
            </div>
        </aside>

        <div class="notebook-actions">
            <form id="delete-notebook-form"
                  class="delete-notebook-form"
                  method="post"
                  action="{% url 'runner:delete_notebook' notebook.id %}">
                {% csrf_token %}
                <button type="submit" data-action="delete-notebook">🗑 Удалить блокнот</button>
            </form>
            <button data-action="export-notebook">📥 Экспорт ноутбука</button>
            <button data-action="import-notebook">📤 Импорт ноутбука</button>
            <input type="file" id="import-file-input" accept=".json" style="display: none;" data-import-url="{% url 'runner:import_notebook' %}">
            <button data-action="create-cell">➕ Новая ячейка кода</button>
            <button data-action="create-latex-cell">➕ Новая LaTeX-ячейка</button>
            <button onclick="runAll()">Запустить все ячейки с кодом</button>
            <button data-action="paste-at-end" data-paste-button disabled>📋 Вставить в конец</button>
            <span class="clipboard-indicator" data-clipboard-indicator data-state="empty">Буфер пуст</span>
        </div>

        <!-- Сообщения о статусе импорта/экспорта -->
        <div id="import-export-status" style="display: none; margin: 10px 0; padding: 10px; border-radius: 4px;"></div>

        <div id="cells-container">
            {% for cell in cells %}
                {% include 'notebook/cell.html' with cell=cell notebook=notebook %}
            {% endfor %}
        </div>
    </div>

    {% csrf_token %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            notebookDetail.init({
                notebookId: {{ notebook.id }},
                csrfToken: '{{ csrf_token }}',
                runCellUrl: '{% url "run-cell" %}',
                sessionCreateUrl: '{% url "notebook-session-create" %}',
                sessionResetUrl: '{% url "session-reset" %}',
                sessionFilesUrl: '{% url "session-files" %}',
                sessionFileDownloadUrl: '{% url "session-file-download" %}',
                sessionStopUrl: '{% url "session-stop" %}'
            });
        });
        const runAll = function() {
            console.log("gooool")
            const cells = document.querySelectorAll('.cell')
            for (const cell of cells) {
                const id = cell.getAttribute('data-cell-id');
                console.log(cell)
                if (!id) continue;

                // запускаем так же, как запускается одиночная ячейка
                notebookDetail.runCell(id);
            }
        };
    </script>
</body>
</html>
