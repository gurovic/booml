services:
  postgres:
    container_name: booml-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booml
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booml"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    container_name: booml-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default:
        aliases:
          - redis

  runner-vm:
    image: runner-vm:latest
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    command: ["true"]

  backend:
    container_name: booml-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8100
      "
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./problem_data:/problem_data
      - /run/user/1001/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runner-vm:
        condition: service_started
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: 919f7d0d675609d2375a212f0ad4d8d5560dc5ce9f71727a7360d7a47bd2c614
      DEBUG: "False"
      MODE: dev
      CAPTCHA_PROVIDER: turnstile
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      DB_NAME: booml
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      ALLOWED_HOSTS: booml.letovo.site,backend.booml.letovo.site,backend,localhost,127.0.0.1,10.8.45.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8101,http://booml.letovo.site,https://booml.letovo.site,http://10.8.45.1:8090,http://10.8.45.1:8092
      RUNTIME_EXECUTION_BACKEND: legacy
      RUNTIME_VM_BACKEND: docker
      PROBLEM_DATA_ROOT: /problem_data/problem_data
      RUNTIME_VM_HOST_ROOT: /home/booml/booml/backend
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      RUNNER_USE_CELERY_QUEUE: "1"

  celery:
    container_name: booml-celery
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        celery -A runner.celery:app worker -l info
      "
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./problem_data:/problem_data
      - /run/user/1001/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: 919f7d0d675609d2375a212f0ad4d8d5560dc5ce9f71727a7360d7a47bd2c614
      DEBUG: "False"
      MODE: dev
      DB_NAME: booml
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      RUNTIME_VM_BACKEND: docker
      PROBLEM_DATA_ROOT: /problem_data/problem_data
      RUNTIME_VM_HOST_ROOT: /home/booml/booml/backend
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      RUNNER_USE_CELERY_QUEUE: "1"

  frontend:
    container_name: booml-frontend
    image: node:18
    working_dir: /app
    command: >
      sh -c "
        npm install --include=dev &&
        NODE_ENV=production npm run serve -- --host 0.0.0.0 --port 8101
      "
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      VUE_APP_API_BASE: /api
      VUE_APP_BACKEND_URL: http://backend:8100/
      VUE_APP_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
    depends_on:
      - backend

  nginx:
    container_name: booml-nginx
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/staticfiles:/staticfiles:ro
      - ./backend/media:/media_files:ro
    ports:
      - "8090:8090"
      - "8092:8092"
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  frontend-node-modules:
  redis-data:
  postgres-data:
