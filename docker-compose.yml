services:
  postgres:
    container_name: booml-postgres
    image: postgres:16-alpine
    command: >
      sh -c "
        mkdir -p /logs/postgres &&
        chown -R postgres:postgres /logs/postgres &&
        exec docker-entrypoint.sh postgres
          -c logging_collector=on
          -c log_directory=/logs/postgres
          -c log_filename=postgres.log
          -c log_rotation_age=1d
          -c log_truncate_on_rotation=off
      "
    environment:
      POSTGRES_DB: booml
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./logs/postgres:/logs/postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booml"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    container_name: booml-redis
    image: redis:7-alpine
    command: >
      sh -c "
        mkdir -p /logs/redis &&
        chown -R redis:redis /logs/redis &&
        exec redis-server --appendonly yes --logfile /logs/redis/redis.log
      "
    volumes:
      - redis-data:/data
      - ./logs/redis:/logs/redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default:
        aliases:
          - redis

  runner-vm:
    image: runner-vm:latest
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    command: ["true"]
    volumes:
      - ./logs/runner-vm:/logs/runner-vm

  backend:
    container_name: booml-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        mkdir -p /logs/backend &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8100
      "
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./logs/backend:/logs/backend
      - ./problem_data:/problem_data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8100:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runner-vm:
        condition: service_started
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      MODE: dev
      CAPTCHA_PROVIDER: turnstile
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      DB_NAME: booml
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      ALLOWED_HOSTS: booml.letovo.site,backend.booml.letovo.site,backend,localhost,127.0.0.1,0.0.0.0
      CSRF_TRUSTED_ORIGINS: http://localhost:8101,http://frontend:8101,http://booml.letovo.site,https://booml.letovo.site,http://backend.booml.letovo.site,https://backend.booml.letovo.site
      RUNTIME_EXECUTION_BACKEND: legacy
      RUNTIME_VM_BACKEND: docker
      PROBLEM_DATA_ROOT: /problem_data/problem_data
      # Host path corresponding to /app inside container; used for Docker VM bind mounts.
      RUNTIME_VM_HOST_ROOT: ${PWD}/backend
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      RUNNER_USE_CELERY_QUEUE: ${RUNNER_USE_CELERY_QUEUE:-1}
      LOG_DIR: /logs/backend

  celery:
    container_name: booml-celery
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "
        mkdir -p /logs/celery &&
        celery -A runner.celery:app worker -l info --logfile=/logs/celery/celery.log
      "
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./logs/celery:/logs/celery
      - ./problem_data:/problem_data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      MODE: dev
      CAPTCHA_PROVIDER: turnstile
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      DB_NAME: booml
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      RUNTIME_VM_BACKEND: docker
      PROBLEM_DATA_ROOT: /problem_data/problem_data
      # Host path corresponding to /app inside container; used for Docker VM bind mounts.
      RUNTIME_VM_HOST_ROOT: ${PWD}/backend
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHANNEL_LAYER_REDIS_URL: redis://redis:6379/2
      RUNNER_USE_CELERY_QUEUE: ${RUNNER_USE_CELERY_QUEUE:-1}
      LOG_DIR: /logs/celery

  frontend:
    container_name: booml-frontend
    image: node:18
    working_dir: /app
    command: >
      bash -lc "
        set -o pipefail &&
        mkdir -p /logs/frontend &&
        npm install 2>&1 | tee -a /logs/frontend/container.log &&
        npm run serve -- --host 0.0.0.0 --port 8101 2>&1 | tee -a /logs/frontend/container.log
      "
    volumes:
      - ./frontend:/app
      - ./logs/frontend:/logs/frontend
      - frontend-node-modules:/app/node_modules
    environment:
      VUE_APP_API_BASE: /api
      VUE_APP_BACKEND_URL: http://backend:8100/
      VUE_APP_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      VUE_APP_DASHBOARD_URL: http://localhost:8102
    ports:
      - "8101:8101"
    depends_on:
      - backend

volumes:
  frontend-node-modules:
  redis-data:
  postgres-data:
